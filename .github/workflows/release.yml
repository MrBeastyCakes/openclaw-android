name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: android/www/package-lock.json
      
    - name: Install npm dependencies
      run: |
        cd android/www
        npm ci
        
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build APKs
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug assembleRelease
        
    - name: Rename APKs with version
      run: |
        VERSION=${{ github.ref_name }}
        mkdir -p release
        cp android/app/build/outputs/apk/debug/app-debug.apk "release/openclaw-android-${VERSION}-debug.apk"
        cp android/app/build/outputs/apk/release/app-release-unsigned.apk "release/openclaw-android-${VERSION}-release.apk"
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release/*.apk
        body: |
          ## OpenClaw Android ${{ github.ref_name }}
          
          ### Files
          - `openclaw-android-${{ github.ref_name }}-debug.apk` - Debug build (faster install, larger size)
          - `openclaw-android-${{ github.ref_name }}-release.apk` - Release build (smaller, unsigned)
          
          ### Installation
          1. Download the APK
          2. Enable "Install from Unknown Sources" in Settings → Security
          3. Install and enjoy!
          
          ### Changelog
          See [CHANGELOG.md](../../CHANGELOG.md) for full details.
          
          ### Notes
          - Release APK is unsigned - you'll need to allow "Install anyway" on first install
          - Debug APK includes debugging symbols and is larger
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
